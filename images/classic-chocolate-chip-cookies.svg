<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d2691e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cookieGradient" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#cd853f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGradient)"/>
  
  <!-- Cookie 1 (larger, center-left) -->
  <g>
    <circle cx="300" cy="300" r="120" fill="url(#cookieGradient)" stroke="#8b4513" stroke-width="3"/>
    <!-- Cookie texture -->
    <circle cx="300" cy="300" r="115" fill="none" stroke="#a0522d" stroke-width="1" opacity="0.3"/>
    
    <!-- Chocolate chips -->
    <ellipse cx="250" cy="270" rx="18" ry="22" fill="#3d2817" transform="rotate(-30 250 270)"/>
    <ellipse cx="340" cy="280" rx="16" ry="20" fill="#3d2817" transform="rotate(45 340 280)"/>
    <ellipse cx="270" cy="330" rx="15" ry="18" fill="#3d2817" transform="rotate(-20 270 330)"/>
    <ellipse cx="320" cy="340" rx="17" ry="21" fill="#3d2817" transform="rotate(60 320 340)"/>
    <ellipse cx="280" cy="290" rx="14" ry="17" fill="#3d2817" transform="rotate(-45 280 290)"/>
    <ellipse cx="310" cy="310" rx="15" ry="19" fill="#3d2817" transform="rotate(30 310 310)"/>
  </g>
  
  <!-- Cookie 2 (center-right, slightly tilted) -->
  <g transform="rotate(-15 800 320)">
    <circle cx="800" cy="320" r="110" fill="url(#cookieGradient)" stroke="#8b4513" stroke-width="3"/>
    <circle cx="800" cy="320" r="105" fill="none" stroke="#a0522d" stroke-width="1" opacity="0.3"/>
    
    <!-- Chocolate chips -->
    <ellipse cx="760" cy="290" rx="17" ry="20" fill="#3d2817" transform="rotate(-35 760 290)"/>
    <ellipse cx="840" cy="300" rx="15" ry="19" fill="#3d2817" transform="rotate(50 840 300)"/>
    <ellipse cx="770" cy="350" rx="16" ry="21" fill="#3d2817" transform="rotate(-15 770 350)"/>
    <ellipse cx="820" cy="360" rx="17" ry="20" fill="#3d2817" transform="rotate(65 820 360)"/>
    <ellipse cx="800" cy="310" rx="14" ry="18" fill="#3d2817" transform="rotate(-40 800 310)"/>
  </g>
  
  <!-- Cookie 3 (top-right) -->
  <g transform="rotate(25 950 200)">
    <circle cx="950" cy="200" r="95" fill="url(#cookieGradient)" stroke="#8b4513" stroke-width="2"/>
    <circle cx="950" cy="200" r="90" fill="none" stroke="#a0522d" stroke-width="1" opacity="0.3"/>
    
    <!-- Chocolate chips -->
    <ellipse cx="920" cy="175" rx="14" ry="17" fill="#3d2817" transform="rotate(-25 920 175)"/>
    <ellipse cx="970" cy="185" rx="16" ry="19" fill="#3d2817" transform="rotate(40 970 185)"/>
    <ellipse cx="930" cy="220" rx="15" ry="18" fill="#3d2817" transform="rotate(-10 930 220)"/>
    <ellipse cx="960" cy="225" rx="13" ry="17" fill="#3d2817" transform="rotate(55 960 225)"/>
  </g>
  
  <!-- Glass of milk -->
  <g>
    <rect x="1050" y="350" width="100" height="180" rx="8" fill="none" stroke="#d3d3d3" stroke-width="4"/>
    <!-- Milk -->
    <rect x="1054" y="410" width="92" height="116" rx="4" fill="#f5f5dc" opacity="0.7"/>
    <!-- Milk shine -->
    <ellipse cx="1070" cy="420" rx="25" ry="15" fill="white" opacity="0.4"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="560" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif" text-shadow="2px 2px 4px rgba(0,0,0,0.5)">
    Classic Chocolate Chip Cookies
  </text>
</svg>
